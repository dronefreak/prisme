# configs/example.yaml
input: video.mp4
output: result.mp4
tile_width: 640
tile_height: 480

# ── Tasks ─────────────────────────────────────────────────────────────────
# Dict-keyed by task name. Comment out a block to disable that task.
# Execution order follows the order defined here.
# Any param can be overridden at the CLI with Hydra dot-notation, e.g.:
#   prisme tasks.semantic_segmentation.segformer_model=b0
#   prisme tasks.depth_estimation.model_size=large

tasks:

  # surface_normals:
  #   resize_before_inference: 1280

  # panoptic_segmentation:
  #   model_size: small           # options: small, medium, large
  #   alpha: 0.6
  #   resize_before_inference: 1280

  # object_detection:
  #   threshold: 0.4
  #   resize_before_inference: 1280
  #   rfdetr_model: base            # options: nano, medium, base, large

  # semantic_segmentation:
  #   segformer_model: b2           # options: b0, b1, b2, b3, b4, b5
  #   resize_before_inference: 1280

  # depth_estimation:
  #   model_size: base              # options: small, base, large
  #   resize_before_inference: 1280

  # hybridnets:
  #   road_alpha: 0.4               # drivable area overlay opacity
  #   lane_alpha: 0.6               # lane line overlay opacity
  #   conf_road: 0.5                # softmax threshold for road class
  #   conf_lane: 0.5                # softmax threshold for lane class
  #   resize_before_inference: 0    # set e.g. 1280 to cap on 4K input

  # pose_estimation:
  #   det_model: yolov8n            # options: yolov8n/s/m/l/x, yolov9c/e, yolov10n-x, yolo11n-x
  #   det_conf: 0.3
  #   det_iou: 0.45
  #   kp_conf: 0.3
  #   kp_radius: 4
  #   limb_thickness: 2
  #   bbox_pad: 0.1

  yolo_detection:
    model: yolov8n                # options: yolov8n/s/m/l/x, yolov9c/e, yolov10n-x, yolo11n-x
    conf: 0.25
    iou: 0.45
    show_labels: true
    show_conf: true
    line_thickness: 2

  yolo_segmentation:
    model: yolov8n-seg            # options: yolov8n/s/m/l/x-seg, yolo11n/s/m/l/x-seg
    conf: 0.25
    iou: 0.45
    mask_alpha: 0.45
    show_boxes: true
    show_labels: true
    show_conf: true
    line_thickness: 2


# ── Benchmark ──────────────────────────────────────────────────────────────
benchmark:

  # Input source — set one, leave the other at its default
  input: null             # path/to/video.mp4 or path/to/frame.jpg
  random: false           # true → generate synthetic solid-grey frames

  # Resolution used when random: true (ignored otherwise)
  random_width: 1920
  random_height: 1080

  # Tasks to benchmark — mirrors keys from the tasks: block above, or 'all'
  #   tasks: [depth_estimation, semantic_segmentation]
  tasks:
    - all

  warmup: 5               # frames discarded before timing starts (JIT warm-up)
  runs: 50                # timed frames per task

  # Also benchmark the full multi-task stack together
  stack: false

  show_table: true       # print Rich table + AD suitability notes to terminal
  out: null              # path to write JSON results (null = skip)
  csv: null              # path to write CSV results  (null = skip)
